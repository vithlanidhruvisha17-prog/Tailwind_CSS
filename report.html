<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Feed | CyberShield Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0b0b0b; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 10px; }
        body { background-color: #000; color: white; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        .insta-card { background-color: #0b0b0b; border: 1px solid #262626; }
        .ticker-wrap { background: rgba(38, 38, 38, 0.2); border: 1px solid #262626; border-radius: 12px; overflow: hidden; padding: 15px 0; }
        .ticker { display: flex; white-space: nowrap; width: max-content; animation: marquee 60s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0b0b0b] text-white font-sans selection:bg-[#FFD700] selection:text-black">

<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 md:px-20 py-6 bg-black/80 backdrop-blur-md">
    <div class="flex items-center gap-2 group cursor-pointer">
        <div class="w-8 h-8 bg-[#FFD700] rounded-lg flex items-center justify-center text-black font-black text-xl shadow-[0_0_15px_rgba(255,215,0,0.3)]">C</div>
        <span class="text-[#FFD700] text-2xl font-black tracking-tighter uppercase">CyberShield Hub</span>
    </div>
    <ul class="hidden md:flex items-center space-x-10">
        <li><a href="index.html" class="text-gray-400 text-xs font-bold uppercase hover:text-white transition-colors">Home</a></li>
        <li><a href="report.html" class="text-[#FFD700] text-xs font-bold uppercase border-b-2 border-[#FFD700] pb-1">Posts</a></li>
        <li><a href="tutorial.html" class="text-gray-400 text-xs font-bold uppercase hover:text-white transition-colors">Tutorial</a></li>
        <li><a href="live.html" class="text-gray-400 text-xs font-bold uppercase hover:text-white transition-colors">Live</a></li>
    </ul>
    <div id="nav-auth" class="flex items-center gap-4"></div>
</nav>

<div class="max-w-7xl mx-auto flex justify-center gap-10 pt-32 px-4">
    <main class="w-full md:max-w-[600px] mb-20">
        <div class="mb-10">
            <div class="flex items-center gap-2 text-[10px] font-black text-zinc-500 tracking-widest mb-3">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> LIVE THREATS
            </div>
            <div class="ticker-wrap">
                <div id="newsTicker" class="ticker">
                    <div class="ticker-item px-10 text-xs">Fetching latest cyber intelligence...</div>
                </div>
            </div>
        </div>

        <div id="feed-container" class="space-y-8">
            <div id="loading-text" class="text-center py-20 text-zinc-700 animate-pulse uppercase tracking-widest text-xs">Loading Secure Feed...</div>
        </div>
    </main>

    <aside class="hidden lg:block w-80 sticky top-32 h-fit">
        <div class="p-6 border border-zinc-800 rounded-2xl bg-zinc-900/20">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-5">Threat Probability</h3>
            <div class="space-y-6">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold">Phishing</span>
                    <span class="text-[9px] text-yellow-400 font-black">8.2/10 HIGH</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold">Malware</span>
                    <span class="text-[9px] text-red-500 font-black">9.5/10 CRITICAL</span>
                </div>
            </div>
        </div>
    </aside>
</div>

<script>
    const API_BASE = "https://cybershield-backend-pt18.onrender.com";
    const users = ["Cyber_Guardian", "Root_Access", "Shield_Master", "Dhruvi_17", "Hack_Stopper", "Security_Pro"];
    const currentUser = localStorage.getItem("currentUser");

    if (!localStorage.getItem("isLoggedIn")) window.location.href = "login.html";

    window.onload = () => {
        updateNavbar();
        loadLiveHeadlines();
        loadFullFeed();
    };

    function updateNavbar() {
        const navRight = document.getElementById('nav-auth');
        if (currentUser) {
            navRight.innerHTML = `
                <div class="flex items-center gap-3 bg-white/5 p-1 pr-4 rounded-full border border-white/10">
                    <a href="profile.html" class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-[#FFD700] rounded-full flex items-center justify-center text-black font-black text-xs">
                            ${currentUser[0].toUpperCase()}
                        </div>
                        <span class="text-[#FFD700] text-[10px] font-bold uppercase">${currentUser}</span>
                    </a>
                    <button onclick="logout()" class="ml-2 pl-3 border-l border-white/10 text-[9px] text-red-500 font-black">LOGOUT</button>
                </div>`;
        }
    }

    async function loadFullFeed() {
        try {
            const [aiRes, kaggleRes] = await Promise.all([
                fetch(`${API_BASE}/reports`),
                fetch(`${API_BASE}/api/reports`)
            ]);
            
            const aiData = await aiRes.json();
            const kaggleData = await kaggleRes.json();
            
            document.getElementById('loading-text')?.remove();
            const feed = document.getElementById('feed-container');
            feed.innerHTML = '';

            const unified = [
                ...aiData.map(i => ({ ...i, isAI: true, date: new Date(i.createdAt || Date.now()) })),
                ...kaggleData.map(i => ({ ...i, isAI: false, date: new Date(0) }))
            ].sort((a, b) => b.date - a.date);

            unified.forEach(post => {
                const randomUser = users[Math.floor(Math.random() * users.length)];
                feed.insertAdjacentHTML('beforeend', createPost(post, randomUser));
            });
        } catch (err) { console.error("Feed Error:", err); }
    }

    function createPost(data, username) {
        const btnId = `btn-${Math.random().toString(36).substr(2, 5)}`;
        if (username !== currentUser) setTimeout(() => checkStatus(username, btnId), 500);

        return `
        <article class="insta-card rounded-2xl overflow-hidden mb-8 border border-zinc-800 bg-[#0b0b0b]">
            <div class="p-4 flex items-center justify-between border-b border-zinc-900">
                <div class="flex items-center gap-3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${username}" class="w-10 h-10 rounded-full bg-zinc-800 border-2 border-yellow-500">
                    <div>
                        <div class="flex items-center gap-2">
                            <p class="text-[12px] font-black text-white">${username}</p>
                            ${username !== currentUser ? `<button id="${btnId}" onclick="toggleFollow('${username}', this)" class="text-[9px] font-black text-blue-500 border border-blue-500/30 px-3 py-1 rounded-full uppercase">Follow</button>` : ''}
                        </div>
                        <p class="text-[8px] text-zinc-500 uppercase">${data.isAI ? 'Verified Analyst' : 'Security Reporter'}</p>
                    </div>
                </div>
            </div>
            <div class="p-6">
                ${data.image ? `<img src="${data.image}" class="w-full rounded-xl mb-4 border border-zinc-800">` : ''}
                <div class="mb-4 bg-zinc-900/30 p-4 rounded-xl border border-zinc-800/50">
                    <p class="text-[9px] text-yellow-500 font-black mb-1">REPORTED CONTENT:</p>
                    <p class="text-xs text-zinc-400 italic">"${data.text}"</p>
                </div>
                <div class="text-sm text-zinc-200 leading-relaxed border-l-2 border-yellow-500/50 pl-4 whitespace-pre-line">
                    ${data.result || data.label || 'Malicious Activity Detected'}
                </div>
            </div>
            <div class="px-6 py-4 border-t border-zinc-900 flex gap-6 text-zinc-400">
                <button onclick="likePost('${data._id}', this)" class="flex items-center gap-2 text-xs hover:text-red-500">
                    <i class="fa-regular fa-heart"></i> <span>${data.likes || 0}</span>
                </button>
                <button onclick="document.getElementById('cmt-${data._id}').classList.toggle('hidden')" class="flex items-center gap-2 text-xs hover:text-blue-500">
                    <i class="fa-regular fa-comment"></i> Reply
                </button>
            </div>
            <div id="cmt-${data._id}" class="hidden p-6 bg-black/20 border-t border-zinc-900">
                <div class="flex gap-2">
                    <input type="text" id="in-${data._id}" placeholder="Advice..." class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-xs">
                    <button onclick="addComment('${data._id}')" class="bg-yellow-500 text-black px-4 py-1 rounded-lg text-[10px] font-black">SEND</button>
                </div>
            </div>
        </article>`;
    }

    async function toggleFollow(target, btn) {
        btn.disabled = true;
        try {
            const res = await fetch(`${API_BASE}/api/follow`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ follower: currentUser, following: target })
            });
            const data = await res.json();
            btn.innerText = data.status === 'followed' ? "FOLLOWING" : "FOLLOW";
            btn.classList.toggle('text-blue-500', data.status !== 'followed');
            btn.classList.toggle('text-zinc-500', data.status === 'followed');
        } catch (e) { console.error(e); }
        btn.disabled = false;
    }

    async function checkStatus(target, btnId) {
        try {
            const res = await fetch(`${API_BASE}/api/is-following/${currentUser}/${target}`);
            const data = await res.json();
            const btn = document.getElementById(btnId);
            if (data.following && btn) {
                btn.innerText = "FOLLOWING";
                btn.classList.replace('text-blue-500', 'text-zinc-500');
            }
        } catch (e) { }
    }

    async function loadLiveHeadlines() {
        try {
            const res = await fetch(`${API_BASE}/api/cyber-news`);
            const data = await res.json();
            document.getElementById('newsTicker').innerHTML = data.news.map(n => `<div class="px-10 text-xs font-bold text-zinc-400"><span class="text-red-600">● LIVE:</span> ${n}</div>`).join('');
        } catch (e) {}
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
